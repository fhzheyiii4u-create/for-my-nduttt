<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to bottom, #ffd6e0, #ffeef2);
      overflow: hidden;
    }

    h1 {
      color: #ff4d6d;
      margin-top: 50px;
    }

    /* SLIDER */
    .slider {
      width: 80%;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 20px;
    }

    .slides {
      display: flex;
      width: 300%;
      animation: slide 10s infinite;
    }

    .slides img {
      width: 100%;
      border-radius: 20px;
    }

    @keyframes slide {
      0% { transform: translateX(0); }
      33% { transform: translateX(-100%); }
      66% { transform: translateX(-200%); }
      100% { transform: translateX(0); }
    }

    p {
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 20px;
      margin-top: 15px;
    }

    #secret {
      display: none;
      margin-top: 20px;
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10%);}
      100% { transform: translateY(110vh);}
    }
  </style>
</head>

<body>

  <h1>haiii ndutkuuuu ❤️</h1>

  <!-- SLIDER FOTO -->
  <div class="slider">
    <div class="slides">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </div>

  <p>happy mensive satu bulannn yaaa 🤍</p>
  <p><b>aku sayang banget sama kamu 🥺</b></p>

  <button onclick="showMessage()">klik aku 💌</button>

  <p id="secret">
    aku beruntung banget punya kamu 🤍
  </p>

  <script>
    function showMessage() {
      document.getElementById("secret").style.display = "block";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";
      heart.style.animationDuration = Math.random() * 3 + 2 + "s";
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
